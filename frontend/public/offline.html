<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gimme — Offline</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: #1a2e1a;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 320px;
      box-shadow: 0 8px 32px rgba(0,60,0,0.12);
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p  { color: #5a7a5a; font-size: 0.95rem; margin-bottom: 1.5rem; }
    button {
      background: #1a7a4a;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⛳</div>
    <h1>You're offline</h1>
    <p>No internet connection. Check your signal and try again — you might still be on the course.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
